<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./img/icones/favicon.png" type="image/x-icon">
  <link rel="preload" href="./img/curriculo/main.jpg" as="image" fetchpriority="high">
  <link rel="preload" href="./css/style.css" as="style">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <meta name="description" content="Na Viewtrine você encontra as melhores vagas de emprego no setor da moda. Cadastre seu currículo agora e conecte-se com recrutadores de todo o Brasil!">
  <title>Viewtrine - Currículo</title>
</head>

<body>
  <main class="grid">
    <div class="sidebar">
      <div class="upper-sidebar">
        <img src="./img/icones/logo.png" alt="Logo" width="40" height="24">
      </div>
      <nav class="mid-sidebar">
        <ul class="links-sidebar">
          <li><a href="./" class="sidebar-button"><img src="./img/icones/home.svg" alt="Home" width="24" height="24"></a></li>
          <li><a href="./" class="sidebar-button"><img src="./img/icones/vagas.svg" alt="Vagas" width="24" height="24"></a></li>
          <li><a href="./" class="sidebar-button linkAtivo"><img src="./img/icones/minhas-candidaturas.svg" alt="Minhas candidaturas" width="24" height="24"></a>
          <li><a href="./curriculo.html" class="sidebar-button"><img src="./img/icones/curriculo-ativo.svg" alt="Currículo" width="24" height="24"></a></li>
          <li><a href="./" class="sidebar-button"><img src="./img/icones/chat.svg" alt="Chat" width="24" height="24"></a></li>
          <li><a href="./" class="sidebar-button"><img src="./img/icones/perfil.svg" alt="Perfil" width="24" height="24"></a></li>
        </ul>
      </nav>
      <nav class="lower-sidebar">
        <ul class="links-sidebar">
          <li><a href="./" class="sidebar-button"><img src="./img/icones/ajuda.svg" alt="Ajuda" width="24" height="24"></a></li>
          <li><a href="./" class="sidebar-button"><img src="./img/icones/logout.svg" alt="Sair da conta" width="24" height="24"></a></li>
        </ul>
      </nav>
    </div>
    <div class="container">
      <header class="header">
        <h1 class="font-bold">Currículo</h1>
        <div class="header-flex">
          <a href="./"><img src="./img/icones/bell.svg" alt="Notificações"></a>
          <a href="./" class="botao">Seja um assinante ↗</a>
        </div>
      </header>
      <div class="curriculo-grid">
        <img src="./img/curriculo/main.jpg" alt="">
        <div class="curriculo-content">
          <span class="curriculo-texto">/ Currículos</span>
          <h2 class="curriculo-titulo">Você ainda não criou nenhum currículo!</h2>
          <p class="curriculo-texto">Este é o primeiro passo para que empresas do mundo da moda possam te conhecer (:</p>
          <a href="./" class="botao">Criar currículo</a>
        </div>
      </div>
    </div>
  </main>

  <script src="./javascript/script.js"></script>
</body>

</html>
