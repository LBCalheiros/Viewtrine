<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./img/icones/favicon.png" type="image/x-icon">
  <link rel="preload" href="./img/waitlist/fundo.jpg" as="image" fetchpriority="high">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <meta name="description" content="Na Viewtrine você encontra as melhores vagas de emprego no setor da moda. Cadastre seu currículo agora e conecte-se com recrutadores de todo o Brasil!">
  <title>Viewtrine - Waitlist</title>
</head>

<body>
  <main class="fundo-externo">
    <div class="fundo-container">
      <div class="grid-waitlist">
        <ul class="titulos-waitlist font-bold">
          <li>Apareça</li>
          <li>Seja</li>
          <li>Cresça</li>
        </ul>

        <section class="dados-container">
          <div class="flex1">
            <span class="font-regular">/ Lançamento em breve</span>
            <h1 class="font-bold">Construa sua carreira no mundo da moda</h1>
            <p class="font-regular">
              Estamos desenvolvendo uma plataforma que conecta talentos da moda a empresas que contratam
            </p>
          </div>

          <div class="flex2">
            <form action="./waitlist.html" class="form-waitlist">
              <input type="email" name="email" id="email" placeholder="Insira seu melhor e-mail" class="input-email" />
              <button type="submit" class="submit-btn">
                <img src="./img/waitlist/botao.svg" alt="Enviar email" />
              </button>
            </form>
            <p class="ativo font-regular texto-form">feedback-or-error-message</p>
          </div>
        </section>

        <img src="./img/icones/viewtrine-logo.svg" alt="" class="waitlist-logo" />
      </div>
    </div>
  </main>
</body>

</html>
